name: Build UABEA Linux

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        rid:
          - linux-x64
          - linux-musl-x64

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: recursive

    - name: Install .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Build self-contained package
      run: bash eng/linux/package-linux.sh --rid "${{ matrix.rid }}" --output artifacts/linux

    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: uabea-${{ matrix.rid }}
        path: artifacts/linux/uabea-next-${{ matrix.rid }}.tar.gz
